---
engines:
  eslint:
    enabled: true
    exclude_paths:
      - "**/*.test.ts"
      - "**/*.test.tsx"
      - "**/*.spec.ts"
      - "**/*.spec.tsx"
      - "**/__tests__/**"
      - "**/tests/**"
      - "scripts/**"
      - "apps/web/src/**"
      - "apps/worker/src/**"
      - "packages/**"
  opengrep:
    enabled: true
    exclude_paths:
      - "**/*.test.ts"
      - "**/*.test.tsx"
      - "**/*.spec.ts"
      - "**/*.spec.tsx"
      - "**/__tests__/**"
      - "**/tests/**"
      - "apps/web/src/lib/api/index.ts"
  biome:
    enabled: false
  tsqlint:
    enabled: false
  tsql:
    enabled: false
exclude_paths:
  - "coverage/**"
  - "dist/**"
  - "node_modules/**"
  - ".turbo/**"
  - "playwright-report/**"
  - "test-results/**"
  - "**/*.sql"
  - ".opencode/skills/impeccable/**"
  - ".agents/skills/impeccable/**"
  - ".github/skills/impeccable/**"
  - ".impeccable/**"
