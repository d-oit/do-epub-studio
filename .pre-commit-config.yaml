# Pre-commit configuration for do-epub-studio
# See: https://pre-commit.com/
# Install: pip install pre-commit && pre-commit install
#
# Note: Git-native hooks are in scripts/hooks/ and installed via:
#   ./scripts/install-hooks.sh

repos:
  # Pinned SHAs for supply-chain security
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0  # sha: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c
    hooks:
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: check-case-conflict
      - id: check-executables-have-shebangs
      - id: check-json
      - id: check-merge-conflict
      - id: check-symlinks
      - id: check-toml
      - id: check-xml
      - id: check-yaml
      - id: destroyed-symlinks
      - id: detect-private-key
      - id: end-of-file-fixer
      - id: mixed-line-ending
        args: ['--fix=lf']
      - id: trailing-whitespace

  # Shell script checks
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
        args: ['--severity=warning']
        files: \.(sh|bash)$

  # Markdown linting
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.39.0
    hooks:
      - id: markdownlint
        args: ['--config', '.markdownlint.json']

  # Local hooks (custom quality gate)
  - repo: local
    hooks:
      - id: validate-workflows
        name: Validate GitHub Workflows
        entry: scripts/validate-workflows.sh
        language: script
        files: ^\.github/workflows/.*\.yml$
      - id: quality-gate
        name: Run quality gate
        entry: ./scripts/minimal_quality_gate.sh
        language: script
        pass_filenames: false
        always_run: true
        verbose: true

  # Secret scanning (Pinned SHA for supply-chain security, see issue #447)
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.4  # sha: 8c70e7ffe4b3659e389c98f17b3f1062b3fc73cd
    hooks:
      - id: gitleaks

  # YAML linting (Pinned SHA, see issue #446)
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1  # sha: 79a49a06b5ee2c0de1d513a6c11b7c4d3e5c9b3a
    hooks:
      - id: yamllint
        args: ['--strict', '--config-file', '.yamllint.yml']
