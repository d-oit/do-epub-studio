name: Setup pnpm
description: Checkout, setup pnpm/node with cache, and install dependencies

inputs: {}

outputs:
  cache-hit:
    description: Whether the Node.js cache was hit
    value: ${{ steps.setup-node.outputs.cache-hit }}

runs:
  using: composite
  steps:
    - name: Checkout
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

    - name: Setup pnpm
      uses: pnpm/action-setup@b307475762933b98ed359c036b0e51f26b63b74b # v5.0.0

    - name: Setup Node.js
      id: setup-node
      uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a # v4.2.0
      with:
        node-version: '22'
        cache: 'pnpm'

    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile
