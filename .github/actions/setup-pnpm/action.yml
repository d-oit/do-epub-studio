name: Setup pnpm
description: Checkout, setup pnpm/node with cache, and install dependencies

inputs: {}

outputs:
  cache-hit:
    description: Whether the Node.js cache was hit
    value: ${{ steps.setup-node.outputs.cache-hit }}

runs:
  using: composite
  steps:
    - name: Setup pnpm
      uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093  # v6.0.8
      with:
        standalone: true

    - name: Setup Node.js
      id: setup-node
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
      with:
        node-version: '22'

    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile
