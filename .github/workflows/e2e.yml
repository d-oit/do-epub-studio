name: E2E Tests

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

# Opt into Node.js 22 for GitHub Actions
env:
  TURBO_TELEMETRY_DISABLED: 1

permissions:
  contents: read

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup pnpm
        uses: pnpm/action-setup@a7427592b3d189ca74b68581057f690f886fa5d6 # v4.1.0
      - name: Setup Node.js
        uses: actions/setup-node@1d11999632ad94424e65b976d3f8f98114e25379 # v4.2.0
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium firefox

      - name: Run E2E tests
        run: pnpm test:e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload test results
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        if: failure()
        with:
          name: test-results
          path: test-results/
          retention-days: 30
