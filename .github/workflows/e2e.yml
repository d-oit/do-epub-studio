name: E2E Tests

run-name: E2E ${{ github.event_name == 'schedule' && format('Scheduled {0}', github.run_id) || github.event.head_commit.message }}

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

# Opt into Node.js 22 for GitHub Actions to avoid deprecation warnings
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup pnpm
        uses: ./.github/actions/setup-pnpm

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium firefox

      - name: Run E2E tests
        run: pnpm test:e2e:smoke --retries=2

      - name: Upload Playwright report
        uses: actions/upload-artifact@4cec3d8aa04e39d1a68397de0c4cd6fb9dce8ec1 # v4.6.1
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload test results
        uses: actions/upload-artifact@4cec3d8aa04e39d1a68397de0c4cd6fb9dce8ec1 # v4.6.1
        if: failure()
        with:
          name: test-results
          path: test-results/
          retention-days: 30
