name: E2E Tests

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

# Opt into Node.js 24 for GitHub Actions to avoid deprecation warnings
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  VITE_APP_NAME: "do EPUB Studio"
  VITE_APP_DESCRIPTION: "do EPUB Studio - EPUB reading and editorial workspace"
  VITE_APP_THEME_COLOR: "#2563eb"

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run E2E tests
        run: pnpm test:e2e
