name: CI

run-name: "${{ github.event_name == 'pull_request' && format('PR {0}: {1}', github.event.pull_request.number, github.event.pull_request.title) || github.event.head_commit.message }}"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - '**.mdx'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  TURBO_TELEMETRY_DISABLED: 1

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  setup:
    name: Setup & Diagnostics
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: ./.github/actions/setup-pnpm

      - name: Toolchain Diagnostics
        run: |
          echo "--- Environment Info ---"
          node --version
          pnpm --version
          echo "--- Workspace Resolution ---"
          pnpm list -r --depth -1
          echo "--- Pinned Tool Versions ---"
          pnpm list vitest vite @playwright/test -r

  lint:
    name: Lint
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: ./.github/actions/setup-pnpm

      - name: Lint
        run: pnpm lint

  typecheck:
    name: Typecheck
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: ./.github/actions/setup-pnpm

      - name: Typecheck
        run: pnpm typecheck

  test:
    name: Unit Tests
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: ./.github/actions/setup-pnpm

      - name: Run tests with coverage
        run: pnpm test:coverage > verification_output.txt 2>&1 || (cat verification_output.txt && exit 1)
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Upload verification output
        uses: actions/upload-artifact@4cec3d8aa04e39d1a68397de0c4cd6fb9dce8ec1 # v4.6.1
        if: always()
        with:
          name: verification-output
          path: verification_output.txt
          retention-days: 7

      - name: Upload coverage reports
        uses: codecov/codecov-action@v5
        with:
          directory: .
          flags: unittests

  build:
    name: Build
    needs: [lint, typecheck, test]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: ./.github/actions/setup-pnpm

      - name: Build
        run: pnpm build

      - name: Upload build artifacts
        uses: actions/upload-artifact@4cec3d8aa04e39d1a68397de0c4cd6fb9dce8ec1 # v4.6.1
        with:
          name: build-dist
          path: apps/web/dist/
          retention-days: 3

  e2e-smoke:
    name: E2E Smoke Tests
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: ./.github/actions/setup-pnpm

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run Dev Smoke E2E tests
        run: pnpm test:e2e:smoke --project=chromium

      - name: Download build artifacts
        uses: actions/download-artifact@cc203385981b70ca67e1cc392babf9cc229d5806 # v4.1.9
        with:
          name: build-dist
          path: apps/web/dist/

      - name: Run Preview Smoke E2E tests
        run: PLAYWRIGHT_MODE=preview npx playwright test --grep @smoke --project=chromium

      - name: Upload Playwright report
        uses: actions/upload-artifact@4cec3d8aa04e39d1a68397de0c4cd6fb9dce8ec1 # v4.6.1
        if: always()
        with:
          name: playwright-report-smoke
          path: playwright-report/
          retention-days: 7

      - name: Upload test results
        uses: actions/upload-artifact@4cec3d8aa04e39d1a68397de0c4cd6fb9dce8ec1 # v4.6.1
        if: failure()
        with:
          name: test-results-smoke
          path: test-results/
          retention-days: 7
