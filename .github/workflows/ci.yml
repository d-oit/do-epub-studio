name: CI

run-name: "${{ github.event_name == 'pull_request' && format('PR {0}: {1}', github.event.pull_request.number, github.event.pull_request.title) || github.event.head_commit.message }}"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - '**.mdx'
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  TURBO_TELEMETRY_DISABLED: 1
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    name: Path-based change detection
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      src: ${{ steps.filter.outputs.src }}
      reader-core: ${{ steps.filter.outputs.reader-core }}
      worker: ${{ steps.filter.outputs.worker }}
      agent-docs: ${{ steps.filter.outputs.agent-docs }}
      any: ${{ steps.filter.outputs.any }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false
      - id: filter
        uses: dorny/paths-filter@f3ceefdc7ef57bc2d8560787d4b6c33e44044cec  # master @ 2026-06-07 (v3.0.2 release commit is unreachable in the Actions registry; pinning to master HEAD for now)
        with:
          filters: |
            src:
              - 'apps/web/src/**'
              - 'packages/**'
              - 'apps/worker/src/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'turbo.json'
              - 'tsconfig.base.json'
              - 'vite.config.ts'
            reader-core:
              - 'packages/reader-core/src/**'
            worker:
              - 'apps/worker/src/**'
              - 'wrangler.toml'
            agent-docs:
              - '.agents/**'
              - 'agents-docs/**'
              - '.claude/**'
              - '.qwen/**'
              - '.opencode/**'
              - '.commandcode/**'
              - '.gemini/**'
              - '.jules/**'
              - '.windsurf/**'
              - 'plans/**'
              - 'AGENTS.md'
              - 'CLAUDE.md'
              - 'GEMINI.md'
              - 'llms.txt'
              - 'llms-full.txt'
            any:
              - '**'

  setup:
    name: Setup & Diagnostics
    needs: changes
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      cache-hit: ${{ steps.setup-pnpm.outputs.cache-hit }}
      start-time: ${{ steps.start-time.outputs.time }}
    steps:
      - name: Set start time
        id: start-time
        run: echo "time=$(date +%s)" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-pnpm
        id: setup-pnpm

      - name: Toolchain Diagnostics
        run: |
          echo "--- Environment Info ---"
          node --version
          pnpm --version
          echo "--- Workspace Resolution ---"
          pnpm list -r --depth -1
          echo "--- Pinned Tool Versions ---"
          pnpm list vitest vite @playwright/test -r

      - name: Turbo remote cache status
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
        run: |
          echo "TURBO_TOKEN set: $([ -n "$TURBO_TOKEN" ] && echo yes || echo no)"
          echo "TURBO_TEAM set:  $([ -n "$TURBO_TEAM" ] && echo yes || echo no)"
          pnpm turbo run build --dry-run=json 2>/dev/null > turbo-dry.json || true
          node -e "const j=JSON.parse(require('fs').readFileSync('turbo-dry.json','utf8'));for(const t of j.tasks||[]){console.log(t.task+': '+t.cache.cacheStatus)}" || echo "(dry-run unavailable)"

  dep-scan:
    name: Dependency Vulnerability Scan
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-pnpm

      - name: pnpm audit
        run: pnpm audit --audit-level=high

  codeql-alert-check:
    name: CodeQL Alert Check
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      security-events: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-pnpm
      - name: Check CodeQL alerts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ref="${GITHUB_HEAD_REF:-$GITHUB_REF_NAME}"
          count=$(gh api "/repos/${{ github.repository }}/code-scanning/alerts?state=open" 2>/dev/null | \
            jq --arg ref "refs/heads/$ref" '[.[] | select(.most_recent_instance.ref == $ref)] | length' || echo "0")
          echo "::notice::Open CodeQL alerts on $ref: $count"
          [ "$count" = "0" ] || { echo "::error::Open CodeQL alerts on $ref: $count"; exit 1; }

  labeler:
    name: PR Labeler
    needs: setup
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 3
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false
      - name: Apply path-based labels
        uses: actions/labeler@f27b608878404679385c85cfa523b85ccb86e213  # v6.1.0
        with:
          configuration-path: .github/labeler.yml
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          sync-labels: false

  pre-commit:
    name: Pre-commit Hooks
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-pnpm

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Run pre-commit hooks
        run: pre-commit run --all-files --show-diff-on-failure

  lint:
    name: Lint
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-pnpm

      - name: Lint
        id: lint
        continue-on-error: true
        run: pnpm lint

      - name: Auto-fix disallowed SHAs
        if: steps.lint.outcome == 'failure'
        id: auto-fix
        env:
          GITHUB_REF: ${{ github.ref }}
        run: |
          if bash scripts/auto-fix-shas.sh; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add scripts/validate-shas.sh
            if ! git diff --cached --quiet; then
              git commit -m "chore: auto-update SHA allowlist"
              # Only push on PR branches (refs/heads/fix/*, chore/*, dependabot/*)
              if [[ "$GITHUB_REF" =~ ^refs/heads/(fix|chore|dependabot)/ ]]; then
                git push
              fi
            fi
          fi
        shell: bash

      - name: Re-run lint to confirm fix
        if: steps.auto-fix.outcome == 'success'
        run: pnpm lint

  typecheck:
    name: Typecheck
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-pnpm

      - name: Typecheck
        run: pnpm typecheck

  test:
    name: Unit Tests
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-pnpm

      - name: Run unit tests for scripts
        run: pnpm vitest run scripts/__tests__

      - name: Run tests with coverage
        run: pnpm test:coverage > verification_output.txt 2>&1 || (cat verification_output.txt && exit 1)
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Upload verification output
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        if: always()
        with:
          name: verification-output
          path: verification_output.txt
          retention-days: 7

      - name: Upload coverage reports
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f  # v7.0.0
        with:
          directory: .
          flags: unittests

  build:
    name: Build
    needs: [pre-commit, lint, typecheck, test]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false
          fetch-depth: 0
      - uses: ./.github/actions/setup-pnpm

      - name: Build
        run: pnpm build

      - name: Check bundle size
        run: METRICS_OUTPUT=bundle-metrics.json pnpm --filter @do-epub-studio/web test:bundle

      - name: Upload bundle metrics
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: bundle-metrics
          path: apps/web/bundle-metrics.json
          retention-days: 1

      - name: Setup baseline (PR only)
        if: github.event_name == 'pull_request'
        id: baseline
        continue-on-error: true
        uses: ./.github/actions/setup-baseline
        with:
          base-ref: ${{ github.base_ref }}

      - name: Build baseline and collect metrics
        if: github.event_name == 'pull_request' && steps.baseline.outputs.baseline-ok == 'true'
        continue-on-error: true
        working-directory: ${{ steps.baseline.outputs.baseline-dir }}
        env:
          METRICS_OUTPUT: baseline-bundle-metrics.json
          WORKSPACE: ${{ github.workspace }}
        run: |
          pnpm build
          node scripts/check-bundle-size.mjs
          cp baseline-bundle-metrics.json "$WORKSPACE/baseline-bundle-metrics.json"
          rm -rf "${{ steps.baseline.outputs.baseline-dir }}"

      - name: Skip baseline (install failed)
        if: github.event_name == 'pull_request' && steps.baseline.outputs.baseline-ok != 'true'
        run: echo "Skipping baseline — lockfile broken or clone failed (pre-existing)."

      - name: Upload baseline metrics
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: baseline-metrics
          path: baseline-bundle-metrics.json
          retention-days: 1

      - name: Generate SBOM
        run: npx --yes @cyclonedx/cyclonedx-npm@4.2.1 --ignore-npm-errors --output-format json --output-file sbom.cyclonedx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: sbom
          path: sbom.cyclonedx.json
          retention-days: 7

      - name: Upload build artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: build-dist
          path: apps/web/dist/
          retention-days: 3

  e2e-smoke:
    name: E2E Smoke Tests
    if: github.event_name != 'schedule'
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-pnpm

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run Dev Smoke E2E tests
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60  # v4.0.0
        with:
          timeout_minutes: 10
          max_attempts: 2
          command: pnpm test:e2e:smoke --project=chromium
          warning_on_retry: true

      - name: Download build artifacts
        uses: actions/download-artifact@cc203385981b70ca67e1cc392babf9cc229d5806  # v4.1.9
        with:
          name: build-dist
          path: apps/web/dist/

      - name: Run Preview Smoke E2E tests
        run: PLAYWRIGHT_MODE=preview npx playwright test --grep @smoke --project=chromium

      - name: Run Startup Performance Test
        run: METRICS_OUTPUT=startup-metrics.json PLAYWRIGHT_MODE=preview npx playwright test apps/web/src/__tests__/performance.spec.ts --project=chromium

      - name: Upload startup metrics
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: startup-metrics
          path: startup-metrics.json
          retention-days: 1

      - name: Upload Playwright report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        if: always()
        with:
          name: playwright-report-smoke
          path: playwright-report/
          retention-days: 7

      - name: Upload test results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        if: always()
        with:
          name: test-results-smoke
          path: test-results/
          retention-days: 7

  e2e-full:
    name: Scheduled Cross-browser E2E
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-pnpm

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium firefox webkit

      - name: Build web app for preview
        run: pnpm --filter @do-epub-studio/web build

      - name: Run full cross-browser E2E tests
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60  # v4.0.0
        with:
          timeout_minutes: 30
          max_attempts: 2
          command: PLAYWRIGHT_MODE=preview pnpm test:e2e --retries=1
        env:
          PLAYWRIGHT_INCLUDE_WEBKIT: '1'
          PLAYWRIGHT_MODE: preview
          retry_wait_seconds: 30
          warning_on_retry: true

      - name: Upload Playwright report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        if: always()
        with:
          name: playwright-report-full
          path: playwright-report/
          retention-days: 30

      - name: Upload test results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        if: always()
        with:
          name: test-results-full
          path: test-results/
          retention-days: 30

  bench:
    name: Benchmark
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false
          fetch-depth: 0

      - uses: ./.github/actions/setup-pnpm

      - name: Run baseline benchmarks
        if: github.event_name == 'pull_request'
        continue-on-error: true
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          MERGE_BASE="$(git merge-base "origin/$BASE_REF" HEAD)"
          git checkout "$MERGE_BASE"
          pnpm install --frozen-lockfile 2>/dev/null || { echo "Baseline lockfile broken (pre-existing), skipping baseline"; git checkout -; exit 0; }
          pnpm --filter @do-epub-studio/reader-core exec vitest bench --outputJson baseline.json
          mv packages/reader-core/baseline.json ./baseline.json
          git checkout -
          pnpm install --frozen-lockfile

      - name: Run head benchmarks
        run: |
          pnpm --filter @do-epub-studio/reader-core exec vitest bench --outputJson head.json
          mv packages/reader-core/head.json ./head.json

      - name: Compare benchmarks
        if: github.event_name == 'pull_request'
        id: compare
        run: |
          node scripts/compare-benchmarks.mjs baseline.json head.json > bench_comment.md
        continue-on-error: true

      - name: Post benchmark comment
        if: github.event_name == 'pull_request' && hashFiles('bench_comment.md') != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment ${{ github.event.pull_request.number }} --body-file bench_comment.md --edit-last 2>/dev/null || \
            gh pr comment ${{ github.event.pull_request.number }} --body-file bench_comment.md

      - name: Check for regression
        if: github.event_name == 'pull_request'
        continue-on-error: true
        run: |
          node scripts/compare-benchmarks.mjs baseline.json head.json

  performance-report:
    name: Performance Report
    needs: [setup, build, e2e-smoke, bench]
    if: github.event_name == 'pull_request'
    continue-on-error: true
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false

      - name: Download all metrics
        uses: actions/download-artifact@cc203385981b70ca67e1cc392babf9cc229d5806  # v4.1.9
        with:
          path: metrics-artifacts

      - name: Flatten metrics
        run: |
          mkdir -p metrics
          mkdir -p baseline
          find metrics-artifacts/bundle-metrics -name "*.json" -exec cp {} metrics/ \; || true
          find metrics-artifacts/startup-metrics -name "*.json" -exec cp {} metrics/ \; || true
          # Lighthouse runs in a separate workflow; metrics not available here
          find metrics-artifacts/lighthouse-metrics -name "*.json" -exec cp {} metrics/ \; || echo "No lighthouse metrics available (generated in separate workflow)"
          find metrics-artifacts/baseline-metrics -name "baseline-bundle-metrics.json" -exec mv {} baseline/bundle-metrics.json \; || true

      - name: Collect CI metrics
        env:
          START_TIME: ${{ needs.setup.outputs.start-time }}
          CACHE_HIT: ${{ needs.setup.outputs.cache-hit }}
        run: |
          END_TIME="$(date +%s)"
          DURATION=$((END_TIME - START_TIME))
          echo "{\"duration\": $DURATION, \"cacheHit\": \"$CACHE_HIT\"}" > metrics/ci-metrics.json

      - name: Generate report
        run: node scripts/report-performance.mjs metrics baseline

      - name: Post performance report
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh pr comment "$PR_NUMBER" --body-file performance_report.md --edit-last 2>/dev/null || \
            gh pr comment "$PR_NUMBER" --body-file performance_report.md

  notify-failure:
    name: Notify on failure
    if: failure() && github.ref == 'refs/heads/main'
    needs: [pre-commit, lint, typecheck, test, build, e2e-smoke, e2e-full, bench]
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Notify via Slack
        if: env.SLACK_WEBHOOK != ''
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
        uses: slackapi/slack-github-action@45a88b9581bfab2566dc881e2cd66d334e621e2c  # v3.0.3
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK }}
          webhook-type: incoming-webhook
          payload: |
            {"text": "CI failed on main: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"}

      - name: Create issue on failure
        if: env.SLACK_WEBHOOK == ''
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SHA: ${{ github.sha }}
          WORKFLOW: ${{ github.workflow }}
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3  # v9.0.0
        with:
          script: |
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: ['ci-failure']
            });
            const runUrl = process.env.RUN_URL;
            const existing = issues.find(i => i.body && i.body.includes(runUrl));
            if (!existing) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `CI failure on main: ${context.runId}`,
                body: `CI failed on main branch.\n\n**Run:** ${runUrl}\n**Commit:** ${process.env.SHA}\n**Workflow:** ${process.env.WORKFLOW}`,
                labels: ['ci-failure']
              });
            }

  close-failure-issues:
    name: Close resolved CI failure issues
    if: success() && github.ref == 'refs/heads/main'
    needs: [lint, typecheck, test, build, e2e-smoke, bench]
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Close open ci-failure issues
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3  # v9.0.0
        with:
          script: |
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: ['ci-failure']
            });
            for (const issue of issues) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `CI is now passing on main (run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}). Auto-closing.`
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed'
              });
            }
