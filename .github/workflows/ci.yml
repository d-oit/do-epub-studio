name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Opt into Node.js 22 for GitHub Actions
env:
  TURBO_TELEMETRY_DISABLED: 1

permissions:
  contents: read

jobs:
  setup:
    name: Setup & Diagnostics
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup pnpm
        uses: pnpm/action-setup@a7427592b3d189ca74b68581057f690f886fa5d6 # v4.1.0

      - name: Setup Node.js
        uses: actions/setup-node@1d11999632ad94424e65b976d3f8f98114e25379 # v4.2.0
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Toolchain Diagnostics
        run: |
          echo "--- Environment Info ---"
          node --version
          pnpm --version
          echo "--- Workspace Resolution ---"
          pnpm list -r --depth -1
          echo "--- Pinned Tool Versions ---"
          pnpm list vitest vite @playwright/test -r

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

  lint:
    name: Lint
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup pnpm
        uses: pnpm/action-setup@a7427592b3d189ca74b68581057f690f886fa5d6 # v4.1.0

      - name: Setup Node.js
        uses: actions/setup-node@1d11999632ad94424e65b976d3f8f98114e25379 # v4.2.0
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

  typecheck:
    name: Typecheck
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup pnpm
        uses: pnpm/action-setup@a7427592b3d189ca74b68581057f690f886fa5d6 # v4.1.0

      - name: Setup Node.js
        uses: actions/setup-node@1d11999632ad94424e65b976d3f8f98114e25379 # v4.2.0
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

  test:
    name: Unit Tests
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup pnpm
        uses: pnpm/action-setup@a7427592b3d189ca74b68581057f690f886fa5d6 # v4.1.0

      - name: Setup Node.js
        uses: actions/setup-node@1d11999632ad94424e65b976d3f8f98114e25379 # v4.2.0
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests with coverage
        run: pnpm test:coverage > verification_output.txt 2>&1 || (cat verification_output.txt && exit 1)
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Upload verification output
        uses: actions/upload-artifact@4cea1372864a670460f608c0c01996fbe563177f # v4.4.0
        if: always()
        with:
          name: verification-output
          path: verification_output.txt
          retention-days: 7

  smoke-e2e:
    name: Smoke E2E
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup pnpm
        uses: pnpm/action-setup@a7427592b3d189ca74b68581057f690f886fa5d6 # v4.1.0

      - name: Setup Node.js
        uses: actions/setup-node@1d11999632ad94424e65b976d3f8f98114e25379 # v4.2.0
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run Smoke E2E tests
        run: pnpm test:e2e:smoke

      - name: Upload Playwright report
        uses: actions/upload-artifact@4cea1372864a670460f608c0c01996fbe563177f # v4.4.0
        if: always()
        with:
          name: playwright-smoke-report
          path: playwright-report/
          retention-days: 7

  build:
    name: Build
    needs: [lint, typecheck, test]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup pnpm
        uses: pnpm/action-setup@a7427592b3d189ca74b68581057f690f886fa5d6 # v4.1.0

      - name: Setup Node.js
        uses: actions/setup-node@1d11999632ad94424e65b976d3f8f98114e25379 # v4.2.0
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
