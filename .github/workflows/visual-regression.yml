name: Visual Regression
run-name: Visual Regression - ${{ github.event.pull_request.title || github.event_name }}

on:
  pull_request:
    branches: [main]
    paths:
      - 'packages/ui/**'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  chromatic:
    name: Chromatic visual regression
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.actor != 'dependabot[bot]'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: ./.github/actions/setup-pnpm

      - name: Build Storybook
        working-directory: ./packages/ui
        run: pnpm build:storybook --stats-json --output-dir storybook-static

      - name: Publish to Chromatic
        uses: chromaui/action@94713c544284a14195de3b50ef24301579f1877e  # v18.0.1
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          storybookBuildDir: storybook-static
          workingDir: packages/ui
          onlyChanged: true
          exitOnceUploaded: true
          exitZeroOnChanges: true
