name: Visual Regression
run-name: Visual Regression - ${{ github.event.pull_request.title || github.event_name }}

on:
  pull_request:
    branches: [main]
    paths:
      - 'packages/ui/**'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  chromatic:
    name: Chromatic visual regression
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: ./.github/actions/setup-pnpm

      - name: Build Storybook
        working-directory: ./packages/ui
        run: pnpm build:storybook --stats-json --output-dir storybook-static

      - name: Publish to Chromatic
        uses: chromaui/action@155dfb6e769c37734a53d98ce5f9ceb295e23a60  # v17.2.0
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          storybookBuildDir: storybook-static
          workingDir: packages/ui
          onlyChanged: true
          exitOnceUploaded: true
          exitZeroOnChanges: true
