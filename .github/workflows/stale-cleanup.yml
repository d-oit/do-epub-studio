name: Stale Cleanup
run-name: Stale Cleanup - ${{ github.event_name }}

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  stale:
    name: Stale issue and PR cleanup
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/stale@eb5cf3af3ac0a1aa4c9c45633dd1ae542a27a899  # v10.3.0
        with:
          days-before-issue-stale: 90
          days-before-issue-close: 14
          stale-issue-label: stale
          stale-issue-message: 'This issue has been inactive for 90 days. It will be closed in 14 days if no further activity occurs.'
          close-issue-message: 'This issue has been closed due to inactivity. Feel free to reopen if needed.'
          days-before-pr-stale: 30
          days-before-pr-close: 7
          stale-pr-label: stale
          stale-pr-message: 'This PR has been inactive for 30 days. It will be closed in 7 days if no further activity occurs.'
          close-pr-message: 'This PR has been closed due to inactivity. Please create a new PR if the changes are still needed.'

  cleanup-branches:
    name: Delete merged branches
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Delete branches merged into main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
        run: |
          echo "Fetching merged PR branches..."
          default_branch="main"
          excluded_patterns="^(develop|staging|release/.*)$"
          merged_prs=$(gh pr list \
            --repo "$REPOSITORY" \
            --state merged \
            --base "$default_branch" \
            --json headRefName,headRepository \
            --jq ".[] | select(.headRepository.nameWithOwner == \"$REPOSITORY\") | .headRefName" \
            --limit 100 \
            2>/dev/null || true)
          if [ -z "$merged_prs" ]; then
            echo "No merged branches found."
            exit 0
          fi
          echo "$merged_prs" | while read -r branch; do
            if echo "$branch" | grep -qE "$excluded_patterns"; then
              echo "Skipping excluded branch: $branch"
              continue
            fi
            if [ "$branch" = "$default_branch" ]; then
              continue
            fi
            echo "Deleting branch: $branch"
            gh api -X DELETE "repos/$REPOSITORY/git/refs/heads/$branch" \
              --silent --jq '.' 2>/dev/null \
              && echo "  ✓ Deleted $branch" \
              || echo "  ✗ Failed to delete $branch (may already be deleted)"
          done
