name: Release

run-name: Release ${{ github.ref_name }}

on:
  push:
    tags:
      - 'v*'

# Opt into Node.js 22 for GitHub Actions to avoid deprecation warnings
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

concurrency:
  group: ${{ github.workflow }}-release
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: ./.github/actions/setup-pnpm

      - name: Lint and Typecheck
        run: |
          pnpm lint
          pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

  deploy:
    name: Deploy
    needs: verify
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 15
    permissions:
      contents: write
      deployments: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: ./.github/actions/setup-pnpm

      - name: Build
        run: pnpm build

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0  # v4.0.0
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        with:
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          packageManager: pnpm
          wranglerVersion: '4'
          workingDirectory: ./apps/worker

      - name: Deploy Frontend to Cloudflare Pages
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0  # v4.0.0
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        with:
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          packageManager: pnpm
          wranglerVersion: '4'
          command: pages deploy apps/web/dist --project-name=do-epub-studio

      - name: Generate SBOM
        run: npx --yes @cyclonedx/cyclonedx-npm@4.2.1 --output-format json --output-file sbom.cyclonedx.json

      - name: Package Web Distribution
        run: |
          cd apps/web/dist
          zip -r ../../../do-epub-studio-web.zip .
          cd ../../../

      - name: Install Cosign
        uses: sigstore/cosign-installer@053f9b74638557590800a301da1ba82351507e2c  # v3.8.1

      - name: Sign Artifacts
        run: |
          cosign sign-blob --yes --output-signature do-epub-studio-web.zip.sig do-epub-studio-web.zip
          cosign sign-blob --yes --output-signature sbom.cyclonedx.json.sig sbom.cyclonedx.json

      - name: Generate SLSA Provenance
        uses: actions/attest-build-provenance@c074443f1aee8d4aeeae555aebba3282517141b2  # v2.2.3
        with:
          subject-path: |
            do-epub-studio-web.zip
            sbom.cyclonedx.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda  # v3.0.0
        with:
          files: |
            do-epub-studio-web.zip
            do-epub-studio-web.zip.sig
            sbom.cyclonedx.json
            sbom.cyclonedx.json.sig

      - name: Post-deploy health check
        run: |
          echo "Waiting for deployment to propagate..."
          sleep 15
          WORKER_URL="${WORKER_URL:-https://do-epub-studio.d-oit.workers.dev}"
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$WORKER_URL" --connect-timeout 10 --max-time 15 || echo "000")
          echo "Worker health check: HTTP $HTTP_STATUS"
          if [ "$HTTP_STATUS" = "000" ] || [ "$HTTP_STATUS" -ge 500 ]; then
            echo "::warning::Worker may not be healthy (HTTP $HTTP_STATUS)"
          else
            echo "Worker responded with HTTP $HTTP_STATUS"
          fi
