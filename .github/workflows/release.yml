name: Release

run-name: Release ${{ github.ref_name }}

on:
  push:
    tags:
      - 'v*'

# Opt into Node.js 22 for GitHub Actions to avoid deprecation warnings
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  release-readiness:
    name: Release Readiness Gate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      checks: read
    env:
      TAG_NAME: ${{ github.ref_name }}
      TAG_SHA: ${{ github.sha }}
      REPO: ${{ github.repository }}
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
        with:
          persist-credentials: false
          fetch-depth: 0  # Full history for ancestry check

      - name: Verify tag format
        run: |
          if [[ ! "$TAG_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid tag format: $TAG_NAME — expected vX.Y.Z"
            exit 1
          fi
          echo "Tag format valid: $TAG_NAME"

      - name: Verify tag matches VERSION file
        run: |
          TAG_VERSION="${TAG_NAME#v}"
          FILE_VERSION=$(tr -d '[:space:]' < VERSION)
          if [[ "$TAG_VERSION" != "$FILE_VERSION" ]]; then
            echo "::error::Tag version ($TAG_VERSION) does not match VERSION file ($FILE_VERSION)"
            exit 1
          fi
          echo "Tag matches VERSION: $TAG_VERSION"

      - name: Verify tag is on main branch
        run: |
          # Check if the tagged commit is reachable from origin/main
          if ! git merge-base --is-ancestor "$TAG_SHA" origin/main 2>/dev/null; then
            echo "::error::Tagged commit ${TAG_SHA:0:8} is not on the main branch"
            echo "Only commits merged to main can be released."
            exit 1
          fi
          echo "Tagged commit is on main branch"

      - name: Verify CI checks passed
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Checking CI status for commit ${TAG_SHA:0:8}..."

          # Get the check runs for this commit
          CHECKS=$(gh api "repos/${REPO}/commits/$TAG_SHA/check-runs" \
            --jq '.check_runs[] | select(.status == "completed") | {name: .name, conclusion: .conclusion}' 2>/dev/null || echo "[]")

          if [[ -z "$CHECKS" ]] || [[ "$CHECKS" == "[]" ]]; then
            echo "::warning::No check runs found for this commit — may not have CI configured"
            exit 0
          fi

          # Check for any failures
          FAILURES=$(echo "$CHECKS" | jq -r 'select(.conclusion == "failure") | .name' 2>/dev/null || true)
          if [[ -n "$FAILURES" ]]; then
            echo "::error::The following CI checks failed for this commit:"
            echo "$FAILURES"
            echo ""
            echo "Fix the failing checks before releasing."
            exit 1
          fi

          # Check for skipped/incomplete checks
          INCOMPLETE=$(gh api "repos/${REPO}/commits/$TAG_SHA/check-runs" \
            --jq '.check_runs[] | select(.status != "completed") | .name' 2>/dev/null || true)
          if [[ -n "$INCOMPLETE" ]]; then
            echo "::warning::The following checks are not completed:"
            echo "$INCOMPLETE"
          fi

          echo "All CI checks passed for ${TAG_SHA:0:8}"

  verify:
    name: Verify (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        node-version: [22, 24]
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: ./.github/actions/setup-pnpm
        with:
          node-version: ${{ matrix.node-version }}

      - name: Lint and Typecheck
        run: |
          pnpm lint
          pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

  perf-gate:
    name: Performance Budgets
    needs: [verify]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: ./.github/actions/setup-pnpm

      - name: Build
        run: pnpm build

      - name: Check bundle budgets
        run: BUNDLE_BUDGET_FAIL_ON_VIOLATION=1 node scripts/check-bundle-budget.mjs

  lighthouse-gate:
    name: Lighthouse Performance Gate
    needs: [verify]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: ./.github/actions/setup-pnpm

      - name: Build
        run: pnpm build

      - name: Start preview server
        run: |
          pnpm --filter @do-epub-studio/web preview --port 4173 &
          echo "Waiting for preview server..."
          for i in $(seq 1 20); do
            if curl -sf http://localhost:4173/ >/dev/null 2>&1; then
              echo "Preview server ready"
              break
            fi
            if [ "$i" -eq 20 ]; then
              echo "::error::Preview server failed to start"
              exit 1
            fi
            sleep 2
          done

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@3e7e23fb74242897f95c0ba9cabad3d0227b9b18  # v12.6.2
        with:
          urls: |
            http://localhost:4173/
            http://localhost:4173/catalog
            http://localhost:4173/admin
          configPath: .lighthouserc.json
          uploadArtifacts: true

      - name: Enforce Lighthouse assertions
        if: always()
        run: |
          if [ -f "./lighthouseci/assertion-results.json" ]; then
            echo "=== Lighthouse Assertion Results ==="
            jq '.' < ./lighthouseci/assertion-results.json
            FAILURES=$(jq '[.[] | select(.passed == false)] | length' < ./lighthouseci/assertion-results.json)
            if [ "$FAILURES" -gt "0" ]; then
              echo "::error::Lighthouse assertions failed ($FAILURES failures) — blocking release"
              exit 1
            fi
            echo "All Lighthouse assertions passed"
          else
            echo "::warning::No Lighthouse assertion results found"
          fi

      - name: Upload Lighthouse artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: lighthouse-release-report
          path: .lighthouseci/
          retention-days: 30

  release:
    name: Release
    needs: [release-readiness, verify, perf-gate, lighthouse-gate]
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 15
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: ./.github/actions/setup-pnpm

      - name: Build
        run: pnpm build

      - name: Validate Cloudflare secrets
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo '::error::CLOUDFLARE_API_TOKEN secret is not set. Add it in repository Settings → Secrets → Actions.'
            exit 1
          fi

      - name: Validate Worker deployment configuration
        working-directory: apps/worker
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: pnpm exec wrangler deploy --config wrangler.jsonc --dry-run

      - name: Generate SBOM
        run: npx --yes @cyclonedx/cyclonedx-npm@4.2.1 --ignore-npm-errors --output-format json --output-file sbom.cyclonedx.json

      - name: Package Web Distribution
        run: |
          cd apps/web/dist
          zip -r ../../../do-epub-studio-web.zip .
          cd ../../../

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6  # v4.1.2

      - name: Sign Artifacts
        run: |
          cosign sign-blob --yes --output-signature do-epub-studio-web.zip.sig do-epub-studio-web.zip
          cosign sign-blob --yes --output-signature sbom.cyclonedx.json.sig sbom.cyclonedx.json

      - name: Generate SLSA Provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373  # v4.1.1
        with:
          subject-path: |
            do-epub-studio-web.zip
            sbom.cyclonedx.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228  # v3.0.2
        with:
          files: |
            do-epub-studio-web.zip
            do-epub-studio-web.zip.sig
            sbom.cyclonedx.json
            sbom.cyclonedx.json.sig

      - name: Post-deploy health check
        run: |
          # Deployment is now handled by Cloudflare Git integration (async).
          # Wait longer for propagation before checking.
          echo "Waiting for Cloudflare deployment to propagate (up to 60s)..."
          WORKER_URL="${WORKER_URL:-https://do-epub-studio.d-oit.workers.dev}"
          for i in $(seq 1 12); do
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$WORKER_URL" --connect-timeout 5 --max-time 10 || echo "000")
            if [ "$HTTP_STATUS" != "000" ] && [ "$HTTP_STATUS" -lt 500 ]; then
              echo "Worker health check: HTTP $HTTP_STATUS (attempt $i)"
              exit 0
            fi
            echo "Attempt $i: HTTP $HTTP_STATUS — retrying in 5s..."
            sleep 5
          done
          echo "::warning::Worker may not be healthy after 60s (HTTP $HTTP_STATUS) — check Cloudflare dashboard"
