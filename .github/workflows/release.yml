name: Release

run-name: Release ${{ github.ref_name }}

on:
  push:
    tags:
      - 'v*'

# Opt into Node.js 22 for GitHub Actions to avoid deprecation warnings
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

concurrency:
  group: ${{ github.workflow }}-release
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  verify:
    name: Verify (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        node-version: [22, 24]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: ./.github/actions/setup-pnpm
        with:
          node-version: ${{ matrix.node-version }}

      - name: Lint and Typecheck
        run: |
          pnpm lint
          pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

  perf-gate:
    name: Performance Budgets
    needs: [verify]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: ./.github/actions/setup-pnpm

      - name: Build
        run: pnpm build

      - name: Check bundle budgets
        run: BUNDLE_BUDGET_FAIL_ON_VIOLATION=1 node scripts/check-bundle-budget.mjs

  lighthouse-gate:
    name: Lighthouse Performance Gate
    needs: [verify]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: ./.github/actions/setup-pnpm

      - name: Build
        run: pnpm build

      - name: Start preview server
        run: |
          pnpm --filter @do-epub-studio/web preview --port 4173 &
          echo "Waiting for preview server..."
          for i in $(seq 1 20); do
            if curl -sf http://localhost:4173/ >/dev/null 2>&1; then
              echo "Preview server ready"
              break
            fi
            if [ "$i" -eq 20 ]; then
              echo "::error::Preview server failed to start"
              exit 1
            fi
            sleep 2
          done

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@3e7e23fb74242897f95c0ba9cabad3d0227b9b18  # v12.6.2
        with:
          urls: |
            http://localhost:4173/
            http://localhost:4173/catalog
            http://localhost:4173/admin
          configPath: .lighthouserc.json
          uploadArtifacts: true

      - name: Enforce Lighthouse assertions
        if: always()
        run: |
          if [ -f "./lighthouseci/assertion-results.json" ]; then
            echo "=== Lighthouse Assertion Results ==="
            jq '.' < ./lighthouseci/assertion-results.json
            FAILURES=$(jq '[.[] | select(.passed == false)] | length' < ./lighthouseci/assertion-results.json)
            if [ "$FAILURES" -gt "0" ]; then
              echo "::error::Lighthouse assertions failed ($FAILURES failures) — blocking release"
              exit 1
            fi
            echo "All Lighthouse assertions passed"
          else
            echo "::warning::No Lighthouse assertion results found"
          fi

      - name: Upload Lighthouse artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: lighthouse-release-report
          path: .lighthouseci/
          retention-days: 30

  deploy:
    name: Deploy
    needs: [verify, perf-gate, lighthouse-gate]
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 15
    permissions:
      contents: write
      deployments: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: ./.github/actions/setup-pnpm

      - name: Build
        run: pnpm build

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0  # v4.0.0
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        with:
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          packageManager: pnpm
          wranglerVersion: '4'
          workingDirectory: ./apps/worker

      - name: Deploy Frontend to Cloudflare Pages
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0  # v4.0.0
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        with:
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          packageManager: pnpm
          wranglerVersion: '4'
          command: pages deploy apps/web/dist --project-name=do-epub-studio

      - name: Generate SBOM
        run: npx --yes @cyclonedx/cyclonedx-npm@4.2.1 --ignore-npm-errors --output-format json --output-file sbom.cyclonedx.json

      - name: Package Web Distribution
        run: |
          cd apps/web/dist
          zip -r ../../../do-epub-studio-web.zip .
          cd ../../../

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6  # v4.1.2

      - name: Sign Artifacts
        run: |
          cosign sign-blob --yes --output-signature do-epub-studio-web.zip.sig do-epub-studio-web.zip
          cosign sign-blob --yes --output-signature sbom.cyclonedx.json.sig sbom.cyclonedx.json

      - name: Generate SLSA Provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373  # v4.1.1
        with:
          subject-path: |
            do-epub-studio-web.zip
            sbom.cyclonedx.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b  # v3.0.1
        with:
          files: |
            do-epub-studio-web.zip
            do-epub-studio-web.zip.sig
            sbom.cyclonedx.json
            sbom.cyclonedx.json.sig

      - name: Post-deploy health check
        run: |
          echo "Waiting for deployment to propagate..."
          sleep 15
          WORKER_URL="${WORKER_URL:-https://do-epub-studio.d-oit.workers.dev}"
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$WORKER_URL" --connect-timeout 10 --max-time 15 || echo "000")
          echo "Worker health check: HTTP $HTTP_STATUS"
          if [ "$HTTP_STATUS" = "000" ] || [ "$HTTP_STATUS" -ge 500 ]; then
            echo "::warning::Worker may not be healthy (HTTP $HTTP_STATUS)"
          else
            echo "Worker responded with HTTP $HTTP_STATUS"
          fi
